<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>構成案 — 言語が減ることって問題ですか?</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Noto Sans JP",sans-serif; background:#faf9f7; color:#1a1a2e; line-height:1.9; font-size:16px; }

  /* ===== パスワード画面 ===== */
  #password-screen { position:fixed; inset:0; background:#1a1a2e; display:flex; align-items:center; justify-content:center; z-index:1000; padding:24px; }
  #password-screen.hidden { display:none; }
  .pw-box { background:#fff; border-radius:12px; padding:40px; max-width:400px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
  .pw-box h1 { font-family:"Noto Serif JP",serif; font-size:20px; margin-bottom:8px; color:#1a1a2e; }
  .pw-box p { font-size:13px; color:#666; margin-bottom:24px; line-height:1.8; }
  .pw-box input { width:100%; padding:12px 16px; font-size:15px; border:2px solid #ddd; border-radius:6px; font-family:"Noto Sans JP",sans-serif; outline:none; transition:border-color 0.2s; }
  .pw-box input:focus { border-color:#c0392b; }
  .pw-box button { width:100%; margin-top:12px; padding:12px; background:#c0392b; color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; font-family:"Noto Sans JP",sans-serif; }
  .pw-box button:hover { background:#a62f24; }
  .pw-error { color:#c0392b; font-size:12px; margin-top:8px; display:none; }
  .pw-error.show { display:block; }

  /* ===== ツールバー ===== */
  .toolbar { position:fixed; top:0; left:0; right:0; z-index:100; background:#1a1a2e; color:#f8f5f0; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); flex-wrap:wrap; gap:10px; }
  .toolbar-left { font-size:12px; color:rgba(248,245,240,0.7); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .toolbar-left .edit-indicator { display:inline-block; width:8px; height:8px; border-radius:50%; background:#6abf6a; animation:pulse 2s infinite; }
  body.editor-mode .edit-indicator { background:#e8a33d; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  body.editor-mode .card-actions { display:none !important; }
  body.editor-mode .btn-add-content { display:none !important; }
  body.editor-mode .btn-gh-settings { display:none !important; }
  body.editor-mode .btn-html-save { display:none !important; }
  body.editor-mode [contenteditable="false"]:focus { outline:none; }

  /* ===== 編集者モード用 ウェルカムバナー ===== */
  .editor-banner { display:none; }
  body.editor-mode .editor-banner {
    display:flex; align-items:flex-start; gap:16px;
    background:linear-gradient(135deg, #fff5e6, #ffe5cc);
    border:2px solid #e8a33d; border-radius:12px;
    padding:18px 22px; margin:0 0 24px 0;
    box-shadow:0 2px 12px rgba(232,163,61,0.15);
    font-size:14px; line-height:1.75;
  }
  .editor-banner .banner-icon { font-size:36px; flex-shrink:0; line-height:1; }
  .editor-banner strong { color:#b45309; font-size:17px; display:block; margin-bottom:6px; }
  .editor-banner .banner-text { flex:1; color:#78350f; }
  .editor-banner ol { margin:8px 0 0 20px; padding:0; }
  .editor-banner li { padding:2px 0; }
  .editor-banner kbd { display:inline-block; background:#fff; border:1px solid #e8a33d; border-radius:4px; padding:1px 7px; font-size:12.5px; font-family:inherit; font-weight:700; color:#b45309; box-shadow:0 1px 0 #e8a33d; vertical-align:baseline; }

  /* 編集者モードで コメントボタンを大きく目立たせる */
  body.editor-mode .comment-toggle {
    background:#c0392b !important; color:#fff !important;
    border:2px solid #c0392b !important;
    padding:8px 16px !important; font-size:13px !important; font-weight:700 !important;
    box-shadow:0 2px 6px rgba(192,57,43,0.3);
    transition:transform 0.15s, box-shadow 0.15s !important;
  }
  body.editor-mode .comment-toggle:hover {
    background:#a62f24 !important;
    transform:translateY(-2px);
    box-shadow:0 4px 10px rgba(192,57,43,0.4);
  }
  body.editor-mode .comment-toggle .cmt-count,
  body.editor-mode .comment-toggle .cmt-unresolved {
    background:#fff !important; color:#c0392b !important;
  }

  /* 編集者モードで保存ボタンの見た目を変える */
  body.editor-mode .btn-gh-save {
    background:#16a34a !important; font-size:14px !important; padding:9px 18px !important; font-weight:700 !important;
  }
  body.editor-mode .btn-gh-save:hover { background:#15803d !important; }
  .toolbar-left .comment-count { background:#c0392b; color:#fff; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
  .toolbar-right { display:flex; gap:8px; flex-wrap:wrap; }
  .toolbar button { background:#c0392b; color:#fff; border:none; padding:7px 14px; border-radius:4px; font-family:"Noto Sans JP",sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:background 0.2s; }
  .toolbar button:hover { background:#a62f24; }
  .toolbar button.secondary { background:rgba(248,245,240,0.15); color:#f8f5f0; }
  .toolbar button.secondary:hover { background:rgba(248,245,240,0.25); }
  .user-select { background:rgba(248,245,240,0.1); color:#f8f5f0; border:1px solid rgba(248,245,240,0.3); padding:6px 10px; border-radius:4px; font-family:"Noto Sans JP",sans-serif; font-size:12px; cursor:pointer; }
  .user-select option { background:#1a1a2e; }

  /* ===== レイアウト ===== */
  .layout { display:grid; grid-template-columns:260px 1fr; min-height:100vh; padding-top:52px; }

  /* ===== サイドバー ===== */
  .sidebar { position:fixed; top:52px; bottom:0; left:0; width:260px; background:#fff; border-right:1px solid #e5e0d8; overflow-y:auto; padding:20px 0; z-index:50; }
  .sidebar-title { font-family:"Noto Serif JP",serif; font-size:13px; font-weight:700; color:#1a1a2e; padding:0 20px 10px; border-bottom:1px solid #eee; margin-bottom:10px; }
  .sidebar-section { font-family:"Noto Serif JP",serif; font-size:11px; font-weight:700; color:#c0392b; padding:14px 20px 6px; letter-spacing:0.1em; }
  .sidebar-item { display:flex; align-items:center; gap:8px; padding:7px 20px; font-size:13px; color:#444; cursor:pointer; border-left:3px solid transparent; transition:all 0.15s; line-height:1.5; }
  .sidebar-item:hover { background:#faf7f3; color:#1a1a2e; }
  .sidebar-item.active { background:#fef3f2; border-left-color:#c0392b; color:#1a1a2e; font-weight:500; }
  .sidebar-item.column { padding-left:32px; font-size:12px; color:#6a4e32; background:#fef7ea; }
  .sidebar-item.column:hover { background:#fdefd5; }
  .sidebar-item.column.active { background:#fde5c0; border-left-color:#d89a3a; }
  .sidebar-item .label { font-family:"Noto Serif JP",serif; font-size:11px; font-weight:700; color:#c0392b; min-width:42px; }
  .sidebar-item.column .label { color:#a96e18; font-family:"Noto Sans JP",sans-serif; font-size:10px; min-width:36px; }
  .sidebar-item .ttl { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sidebar-item .comment-badge { background:#c0392b; color:#fff; font-size:9px; padding:1px 5px; border-radius:8px; font-weight:700; min-width:16px; text-align:center; }

  /* ===== メインコンテンツ ===== */
  .main { grid-column:2; padding:0; }
  .header { background:#1a1a2e; color:#f8f5f0; padding:36px 40px; }
  .header-inner { max-width:820px; margin:0 auto; }
  .header h1 { font-family:"Noto Serif JP",serif; font-size:24px; font-weight:700; margin-bottom:6px; line-height:1.4; }
  .header .subtitle { font-size:12px; color:rgba(248,245,240,0.6); }
  .container { max-width:820px; margin:0 auto; padding:36px 24px 80px; }

  /* ===== 編集可能要素 ===== */
  [contenteditable="true"] { outline:none; transition:background 0.15s, box-shadow 0.15s; border-radius:3px; }
  [contenteditable="true"]:hover { background:rgba(192,57,43,0.05); }
  [contenteditable="true"]:focus { background:rgba(192,57,43,0.08); box-shadow:0 0 0 2px rgba(192,57,43,0.3); padding:2px 4px; margin:-2px -4px; }

  /* ===== カード ===== */
  .spec-box { background:#fff; border-radius:10px; padding:26px 30px; margin-bottom:28px; box-shadow:0 1px 6px rgba(0,0,0,0.06); position:relative; }
  .spec-box h2 { font-family:"Noto Serif JP",serif; font-size:16px; font-weight:700; margin-bottom:16px; color:#1a1a2e; padding-bottom:10px; border-bottom:1px solid #eee; }
  .spec-grid { display:grid; grid-template-columns:120px 1fr; gap:10px 18px; font-size:13.5px; }
  .spec-grid dt { font-weight:700; color:#c0392b; }
  .spec-grid dd { color:#333; line-height:1.85; }

  .toc-box { background:#fff; border-radius:10px; padding:26px 30px; margin-bottom:28px; box-shadow:0 1px 6px rgba(0,0,0,0.06); }
  .toc-box h2 { font-family:"Noto Serif JP",serif; font-size:16px; font-weight:700; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid #eee; }
  .toc-row { display:flex; align-items:baseline; gap:10px; padding:8px 0; border-bottom:1px dashed #eee; font-size:13.5px; }
  .toc-row:last-child { border-bottom:none; }
  .toc-row.column { padding-left:22px; background:#fef7ea; padding-right:10px; margin:3px -10px; border-bottom:1px solid #f5e8d0; font-size:13px; color:#6a4e32; border-radius:4px; }
  .toc-row.column:last-child { border-bottom:none; }
  .toc-label { min-width:62px; font-family:"Noto Serif JP",serif; font-size:11px; font-weight:700; color:#c0392b; letter-spacing:0.1em; }
  .toc-row.column .toc-label { color:#a96e18; font-family:"Noto Sans JP",sans-serif; font-size:10px; }
  .toc-title { flex:1; color:#1a1a2e; line-height:1.6; }
  .toc-row.column .toc-title { color:#5a4014; }
  .toc-pages { font-size:11px; color:#888; background:#f5f2ee; padding:2px 7px; border-radius:3px; min-width:44px; text-align:center; }
  .toc-row.column .toc-pages { background:#fff; color:#a96e18; }
  .toc-add-wrap { margin-top:18px; padding-top:14px; border-top:2px solid #ece6d8; }
  .toc-add-hint { font-size:12px; color:#888; margin-bottom:10px; padding:6px 10px; background:#f8f6f1; border-left:3px solid #c0392b; border-radius:3px; }
  .toc-add-form { display:flex; gap:6px; align-items:center; padding:6px 0; font-size:13px; flex-wrap:wrap; }
  .toc-add-form + .toc-add-form { border-top:1px dashed #eee; margin-top:2px; padding-top:10px; }
  .toc-add-form input { border:1px solid #ddd; border-radius:4px; padding:6px 9px; font-family:inherit; font-size:13px; outline:none; }
  .toc-add-form input:focus { border-color:#c0392b; }
  .toc-add-form .in-label { width:110px; }
  .toc-add-form .in-title { flex:1; min-width:160px; }
  .toc-add-form .in-pages { width:60px; text-align:center; }
  .toc-add-form .in-after { border:1px solid #ddd; border-radius:4px; padding:6px 8px; font-family:inherit; font-size:12px; background:#fff; max-width:200px; cursor:pointer; }
  .toc-add-form .in-after:focus { outline:none; border-color:#c0392b; }
  .toc-add-form button { background:#c0392b; color:#fff; border:none; border-radius:4px; padding:7px 14px; font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; }
  .toc-add-form button:hover { background:#a62f24; }
  .toc-add-form.column input { background:#fffbf3; }
  .toc-add-form.column button { background:#a96e18; }
  .toc-add-form.column button:hover { background:#8a5712; }
  body.editor-mode .toc-add-wrap { display:none !important; }
  .toc-row { position:relative; }
  .toc-row .toc-del {
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px;
    background:transparent; border:none; cursor:pointer;
    color:#ccc; font-size:14px; line-height:1;
    border-radius:4px; padding:0; margin-left:4px;
    opacity:0; transition:opacity 0.15s, background 0.15s, color 0.15s;
    flex-shrink:0;
  }
  .toc-row:hover .toc-del { opacity:0.7; }
  .toc-row .toc-del:hover { opacity:1; background:#fde8e8; color:#c0392b; }
  body.editor-mode .toc-del { display:none !important; }
  .toc-row .toc-plus {
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px;
    background:transparent; border:none; cursor:pointer;
    color:#ccc; font-size:16px; line-height:1; font-weight:700;
    border-radius:4px; padding:0; margin-left:4px;
    opacity:0; transition:opacity 0.15s, background 0.15s, color 0.15s;
    flex-shrink:0;
  }
  .toc-row:hover .toc-plus { opacity:0.7; }
  .toc-row .toc-plus:hover { opacity:1; background:#e0f2e8; color:#166534; }
  body.editor-mode .toc-plus { display:none !important; }
  .toc-row[draggable="true"] { cursor:grab; }
  .toc-row.dragging { opacity:0.4; cursor:grabbing; }
  .toc-row.drop-above { box-shadow:0 -2px 0 #c0392b inset; }
  .toc-row.drop-below { box-shadow:0 2px 0 #c0392b inset; }
  body.editor-mode .toc-row[draggable] { cursor:default; }

  .section-title { font-family:"Noto Serif JP",serif; font-size:19px; font-weight:700; margin:44px 0 18px; padding-bottom:10px; border-bottom:2px solid #c0392b; }

  .chapter-card, .column-card { position:relative; scroll-margin-top:72px; }
  .chapter-card { background:#fff; border-radius:8px; padding:22px 26px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
  .chapter-card.highlight { border-left:4px solid #c0392b; }
  .chapter-card.mine { border-left:4px solid #5a7a9f; }
  .chapter-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; flex-wrap:wrap; gap:8px; }
  .chapter-num { font-family:"Noto Serif JP",serif; font-size:11px; font-weight:700; color:#c0392b; letter-spacing:0.15em; }
  .chapter-num .badge { font-family:"Noto Sans JP",sans-serif; font-size:10px; padding:2px 7px; background:#c0392b; color:#fff; border-radius:3px; letter-spacing:0.1em; margin-left:6px; }
  .chapter-num .badge.mine-badge { background:#5a7a9f; }
  .chapter-pages { font-size:11px; color:#888; background:#f5f2ee; padding:3px 9px; border-radius:3px; font-weight:500; }
  .chapter-title { font-family:"Noto Serif JP",serif; font-size:17px; font-weight:700; margin-bottom:5px; line-height:1.5; }
  .chapter-subtitle { font-size:12.5px; color:#666; margin-bottom:12px; padding-bottom:10px; border-bottom:1px dashed #e0dcd4; line-height:1.75; }
  .chapter-content { font-size:13px; line-height:1.85; color:#333; }
  .chapter-content ul { margin-left:16px; margin-top:4px; }
  .chapter-content li { margin:3px 0; }
  .chapter-content strong { color:#1a1a2e; }

  .column-card { background:#fef7ea; border-left:4px solid #d89a3a; border-radius:8px; padding:22px 26px; margin-bottom:14px; }
  .column-card .column-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; gap:8px; flex-wrap:wrap; }
  .column-card .column-label { font-family:"Noto Serif JP",serif; font-size:10px; font-weight:700; color:#a96e18; letter-spacing:0.15em; }
  .column-card .column-label .column-num { background:#d89a3a; color:#fff; font-family:"Noto Sans JP",sans-serif; font-size:10px; padding:2px 6px; border-radius:3px; margin-right:6px; }
  .column-card .column-pages { font-size:11px; color:#a96e18; background:#fff; padding:3px 9px; border-radius:3px; font-weight:500; }
  .column-card .column-title { font-family:"Noto Serif JP",serif; font-size:16px; font-weight:700; margin-bottom:5px; color:#5a4014; }
  .column-card .column-subtitle { font-size:12.5px; color:#8a6a3a; margin-bottom:12px; padding-bottom:10px; border-bottom:1px dashed #d89a3a; font-style:italic; line-height:1.75; }
  .column-card .column-content { font-size:13px; line-height:1.85; color:#3a2a14; }
  .column-card .column-content ul { margin-left:16px; margin-top:4px; }
  .column-card .column-content li { margin:3px 0; }
  .column-card .column-content strong { color:#a96e18; }

  /* ===== カードアクション ===== */
  .card-actions { position:absolute; top:8px; right:8px; display:flex; gap:4px; opacity:0; transition:opacity 0.2s; }
  .chapter-card:hover .card-actions, .column-card:hover .card-actions { opacity:1; }
  .card-actions button { background:rgba(192,57,43,0.8); color:#fff; border:none; width:24px; height:24px; border-radius:4px; cursor:pointer; font-size:12px; line-height:1; display:flex; align-items:center; justify-content:center; }
  .card-actions button:hover { background:#c0392b; }
  .card-actions button.duplicate { background:rgba(90,122,159,0.8); }
  .card-actions button.duplicate:hover { background:#5a7a9f; }

  /* ===== コメント機能 ===== */
  .comments-section { margin-top:14px; padding-top:12px; border-top:1px dashed rgba(0,0,0,0.1); }
  .comment-toggle { display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px solid rgba(192,57,43,0.3); color:#c0392b; padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer; font-family:"Noto Sans JP",sans-serif; transition:all 0.15s; }
  .comment-toggle:hover { background:#fef3f2; }
  .comment-toggle.has-comments { background:#fef3f2; font-weight:500; }
  .comment-toggle .cmt-icon { font-size:12px; }
  .comment-toggle .cmt-count { background:#c0392b; color:#fff; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:700; }
  .comment-toggle .cmt-unresolved { background:#e8a437; color:#fff; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:700; }

  .comments-list { margin-top:12px; display:none; }
  .comments-list.open { display:block; }
  .comment-item { background:#f7f5f1; border-left:3px solid #5a7a9f; border-radius:4px; padding:10px 14px; margin-bottom:8px; font-size:12.5px; }
  .comment-item.resolved { opacity:0.5; border-left-color:#8a9a8a; }
  .comment-item.by-shimoji { border-left-color:#c0392b; background:#fef5f3; }
  .comment-item.by-editor { border-left-color:#5a7a9f; background:#eef2f7; }
  .comment-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-size:11px; color:#888; }
  .comment-meta .cmt-author { font-weight:700; color:#333; }
  .comment-item.by-shimoji .cmt-author { color:#c0392b; }
  .comment-item.by-editor .cmt-author { color:#5a7a9f; }
  .comment-meta .cmt-actions { display:flex; gap:4px; }
  .comment-meta .cmt-actions button { background:transparent; border:none; color:#888; cursor:pointer; padding:2px 5px; font-size:10px; border-radius:3px; }
  .comment-meta .cmt-actions button:hover { background:rgba(0,0,0,0.05); color:#333; }
  .comment-meta .cmt-actions button.resolve { color:#6a9a6a; }
  .comment-meta .cmt-actions button.resolve.is-resolved { color:#c0392b; }
  .comment-body { line-height:1.7; color:#1a1a2e; white-space:pre-wrap; word-wrap:break-word; }
  .comment-item.resolved .comment-body { text-decoration:line-through; }

  .comment-add { margin-top:10px; padding:10px 12px; background:#fff; border:1px solid #e0dcd4; border-radius:6px; }
  .comment-add textarea { width:100%; border:none; outline:none; resize:vertical; min-height:50px; font-family:"Noto Sans JP",sans-serif; font-size:12.5px; line-height:1.7; color:#1a1a2e; }
  .comment-add .cmt-add-actions { display:flex; justify-content:flex-end; gap:6px; margin-top:8px; }
  .comment-add button { background:#c0392b; color:#fff; border:none; padding:5px 12px; border-radius:4px; font-size:11px; cursor:pointer; }
  .comment-add button:hover { background:#a62f24; }
  .comment-add button.cancel { background:#ccc; color:#333; }
  .comment-add button.cancel:hover { background:#b0b0b0; }

  .note-box { background:#e8eef4; border-left:4px solid #5a7a9f; border-radius:6px; padding:14px 18px; margin:18px 0; font-size:12.5px; line-height:1.8; color:#2c3e50; }
  .note-box strong { color:#2c3e50; }

  .footer { text-align:center; padding:24px; font-size:11px; color:#999; }

  /* ===== レスポンシブ ===== */
  @media (max-width:900px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { position:relative; top:0; width:100%; height:auto; max-height:300px; border-right:none; border-bottom:1px solid #e5e0d8; }
    .main { grid-column:1; }
  }

  /* 印刷時 */
  @media print {
    .toolbar, .sidebar, .card-actions, .comment-toggle, .comments-list, #password-screen { display:none !important; }
    .layout { grid-template-columns:1fr; padding-top:0; }
    .main { grid-column:1; }
  }

  /* 通知 */

<script>
  /* ===========================
     パスワード保護 (AES-GCM)
     =========================== */
  async function deriveKey(password, salt) {
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
      km,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function decryptContent(password) {
    const b64 = document.getElementById("encryptedData").textContent;
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const salt = raw.slice(0, 16);
    const iv = raw.slice(16, 28);
    const ct = raw.slice(28);
    const key = await deriveKey(password, salt);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    return new TextDecoder().decode(pt);
  }

  async function unlock(password) {
    const pt = await decryptContent(password);
    const temp = document.createElement("div");
    temp.innerHTML = pt;
    const inner = temp.querySelector("#app");
    const target = document.getElementById("app");
    if (inner) target.innerHTML = inner.innerHTML;
    else target.innerHTML = pt;
    document.getElementById("password-screen").classList.add("hidden");
    document.getElementById("toolbar").style.display = "flex";
    target.style.display = "grid";
    sessionStorage.setItem("pw_raw", password);
    initApp();
  }

  async function checkPassword() {
    const input = document.getElementById("pw-input").value;
    try {
      await unlock(input);
    } catch (e) {
      const err = document.getElementById("pw-error");
      err.classList.add("show");
      document.getElementById("pw-input").value = "";
    }
  }

  document.getElementById("pw-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") checkPassword();
  });

  (async () => {
    const saved = sessionStorage.getItem("pw_raw");
    if (saved) {
      try { await unlock(saved); }
      catch (e) { sessionStorage.removeItem("pw_raw"); }
    }
  })();

  /* ===========================
     初期化
     =========================== */
  function initApp() {
    // ユーザー選択復元
    const savedUser = localStorage.getItem('active_user');
    if (savedUser) document.getElementById('user-select').value = savedUser;

    // LocalStorage からの復元は保存済みHTMLを読み込んだ場合に有効
    // ここでは既存の DOM のまま使う

    buildSidebar();
    updateCommentCounts();
    setupScrollSpy();

    // 現在のユーザーに応じて編集モード/コメントモードを適用
    applyEditMode();

    // 全体目次 → 本編カードの対応付けと、編集同期リスナー
    linkTocToCards();
    attachAllTocSync();
    addInsertButtonsToTocRows();
    addDeleteButtonsToTocRows();
    makeTocRowsDraggable();
    populateInsertSelects();

    // 暗号化保存された GitHub PAT をロード (存在すれば)
    loadGitHubToken();
  }

  /* ===========================
     サイドバー目次
     =========================== */
  function buildSidebar() {
    const container = document.getElementById('sidebar-content');
    container.innerHTML = '';

    // セクションごとにグループ化
    const addItem = (card, isColumn=false) => {
      const nav = card.getAttribute('data-nav');
      if (!nav) return;
      const id = card.id;
      const item = document.createElement('div');
      item.className = 'sidebar-item' + (isColumn ? ' column' : '');
      item.setAttribute('data-target', id);

      const label = document.createElement('span');
      label.className = 'label';
      // nav の先頭単語をラベルに
      const parts = nav.split(' ');
      label.textContent = parts[0];

      const ttl = document.createElement('span');
      ttl.className = 'ttl';
      ttl.textContent = parts.slice(1).join(' ') || '';

      const badge = document.createElement('span');
      badge.className = 'comment-badge';
      badge.style.display = 'none';
      badge.setAttribute('data-count-for', id);

      item.appendChild(label);
      item.appendChild(ttl);
      item.appendChild(badge);
      item.addEventListener('click', () => {
        document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      container.appendChild(item);
    };

    // 仕様関連
    const specSection = document.createElement('div');
    specSection.className = 'sidebar-section';
    specSection.textContent = 'メモ';
    container.appendChild(specSection);
    document.querySelectorAll('.spec-box, .toc-box').forEach(c => addItem(c, false));

    // 本編
    const mainSection = document.createElement('div');
    mainSection.className = 'sidebar-section';
    mainSection.textContent = '本編';
    container.appendChild(mainSection);
    document.querySelectorAll('.chapter-card').forEach(c => addItem(c, false));

    // コラム
    const colSection = document.createElement('div');
    colSection.className = 'sidebar-section';
    colSection.textContent = 'コラム';
    container.appendChild(colSection);
    document.querySelectorAll('.column-card').forEach(c => addItem(c, true));
  }

  function setupScrollSpy() {
    const items = document.querySelectorAll('.sidebar-item');
    const cards = Array.from(items).map(i => document.getElementById(i.getAttribute('data-target'))).filter(Boolean);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          items.forEach(i => i.classList.toggle('active', i.getAttribute('data-target') === id));
        }
      });
    }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });

    cards.forEach(c => observer.observe(c));
  }

  /* ===========================
     コメント機能
     =========================== */
  function changeUser() {
    const u = document.getElementById('user-select').value;
    localStorage.setItem('active_user', u);
    applyEditMode();
  }

  function applyEditMode() {
    const u = document.getElementById('user-select').value;
    const isEditor = (u === '編集者');
    document.body.classList.toggle('editor-mode', isEditor);
    document.querySelectorAll('#app [contenteditable]').forEach(el => {
      el.setAttribute('contenteditable', isEditor ? 'false' : 'true');
    });
    const label = document.getElementById('mode-label');
    if (label) label.textContent = isEditor ? 'レビューモード (コメントのみ)' : '著者モード (本文編集可)';

    // 保存ボタンのラベルをモードで切替
    const saveLabel = document.querySelector('.btn-gh-save .save-label');
    if (saveLabel) saveLabel.textContent = isEditor ? '☁ コメントを保存' : '☁ 保存';

    // コメント追加ボタンのラベルも編集者モードで分かりやすく
    document.querySelectorAll('.comment-toggle').forEach(btn => {
      const badges = Array.from(btn.querySelectorAll('.cmt-count, .cmt-unresolved'));
      btn.innerHTML = '<span class="cmt-icon">💬</span>' + (isEditor ? ' コメントを見る／追加する' : ' コメント');
      badges.forEach(b => btn.appendChild(b));
    });

    // レビューモードではドラッグ&ドロップを無効化
    document.querySelectorAll('.toc-row').forEach(r => { r.draggable = !isEditor; });
  }

  function toggleComments(btn) {
    const section = btn.closest('.comments-section');
    const list = section.querySelector('.comments-list');
    const isOpen = list.classList.contains('open');
    if (isOpen) {
      list.classList.remove('open');
      list.innerHTML = renderCommentsList(list);
    } else {
      list.classList.add('open');
      list.innerHTML = renderCommentsList(list) + renderCommentAddForm();
    }
  }

  function renderCommentsList(list) {
    const comments = Array.from(list.querySelectorAll(':scope > .comment-item'));
    if (comments.length === 0) {
      return getCommentsData(list).map(renderComment).join('') || '';
    }
    return getCommentsData(list).map(renderComment).join('');
  }

  function getCommentsData(list) {
    // DOM から現在のコメントを取得
    const existing = list.querySelectorAll(':scope > .comment-item');
    const data = [];
    existing.forEach(el => {
      data.push({
        id: el.getAttribute('data-cmt-id') || String(Date.now() + Math.random()),
        author: el.getAttribute('data-author') || '不明',
        body: el.querySelector('.comment-body')?.textContent || '',
        resolved: el.classList.contains('resolved'),
        ts: el.getAttribute('data-ts') || ''
      });
    });
    return data;
  }

  function renderComment(c) {
    const klass = c.author === '下地' ? 'by-shimoji' : (c.author === '編集者' ? 'by-editor' : '');
    return `
      <div class="comment-item ${klass} ${c.resolved ? 'resolved' : ''}" data-cmt-id="${c.id}" data-author="${escapeAttr(c.author)}" data-ts="${escapeAttr(c.ts)}">
        <div class="comment-meta">
          <span><span class="cmt-author">${escapeHtml(c.author)}</span> <span style="color:#aaa;">${escapeHtml(c.ts)}</span></span>
          <span class="cmt-actions">
            <button class="resolve ${c.resolved ? 'is-resolved' : ''}" onclick="toggleResolve('${c.id}', this)">${c.resolved ? '未解決に' : '解決済みに'}</button>
            <button onclick="editComment('${c.id}', this)">編集</button>
            <button onclick="deleteComment('${c.id}', this)">削除</button>
          </span>
        </div>
        <div class="comment-body">${escapeHtml(c.body)}</div>
      </div>
    `;
  }

  function renderCommentAddForm() {
    return `
      <div class="comment-add">
        <textarea placeholder="コメントを入力(${document.getElementById('user-select').value}として投稿)"></textarea>
        <div class="cmt-add-actions">
          <button class="cancel" onclick="cancelComment(this)">キャンセル</button>
          <button onclick="submitComment(this)">投稿</button>
        </div>
      </div>
    `;
  }

  function submitComment(btn) {
    const addBox = btn.closest('.comment-add');
    const textarea = addBox.querySelector('textarea');
    const body = textarea.value.trim();
    if (!body) return;

    const list = addBox.closest('.comments-list');
    const author = document.getElementById('user-select').value;
    const ts = formatDate(new Date());
    const id = 'c' + Date.now() + Math.floor(Math.random() * 1000);

    const newHtml = renderComment({ id, author, body, resolved: false, ts });
    addBox.insertAdjacentHTML('beforebegin', newHtml);
    textarea.value = '';
    updateCommentCounts();
    showNotification('コメントを投稿しました');
  }

  function cancelComment(btn) {
    btn.closest('.comment-add').querySelector('textarea').value = '';
  }

  function deleteComment(id, btn) {
    if (!confirm('このコメントを削除しますか?')) return;
    btn.closest('.comment-item').remove();
    updateCommentCounts();
  }

  function editComment(id, btn) {
    const item = btn.closest('.comment-item');
    const bodyEl = item.querySelector('.comment-body');
    const current = bodyEl.textContent;
    const ta = document.createElement('textarea');
    ta.style.cssText = 'width:100%; min-height:50px; font-family:inherit; font-size:12.5px; line-height:1.7;';
    ta.value = current;
    bodyEl.replaceWith(ta);
    ta.focus();
    ta.addEventListener('blur', () => {
      const newBody = document.createElement('div');
      newBody.className = 'comment-body';
      newBody.textContent = ta.value;
      ta.replaceWith(newBody);
    });
  }

  function toggleResolve(id, btn) {
    const item = btn.closest('.comment-item');
    item.classList.toggle('resolved');
    btn.classList.toggle('is-resolved');
    btn.textContent = item.classList.contains('resolved') ? '未解決に' : '解決済みに';
    updateCommentCounts();
  }

  function updateCommentCounts() {
    let total = 0, unresolved = 0;
    document.querySelectorAll('.chapter-card, .column-card, .spec-box, .toc-box').forEach(card => {
      const list = card.querySelector('.comments-list');
      if (!list) return;
      const comments = list.querySelectorAll('.comment-item');
      const unres = list.querySelectorAll('.comment-item:not(.resolved)');
      total += comments.length;
      unresolved += unres.length;

      const toggle = card.querySelector('.comment-toggle');
      if (toggle) {
        // 既存のバッジを削除
        toggle.querySelectorAll('.cmt-count, .cmt-unresolved').forEach(e => e.remove());
        if (comments.length > 0) {
          toggle.classList.add('has-comments');
          if (unres.length > 0) {
            const ub = document.createElement('span');
            ub.className = 'cmt-unresolved';
            ub.textContent = unres.length + '未解決';
            toggle.appendChild(ub);
          } else {
            const cb = document.createElement('span');
            cb.className = 'cmt-count';
            cb.textContent = comments.length;
            toggle.appendChild(cb);
          }
        } else {
          toggle.classList.remove('has-comments');
        }
      }

      // サイドバーバッジ
      const sbBadge = document.querySelector(`[data-count-for="${card.id}"]`);
      if (sbBadge) {
        if (unres.length > 0) {
          sbBadge.style.display = '';
          sbBadge.textContent = unres.length;
        } else {
          sbBadge.style.display = 'none';
        }
      }
    });

    const toolbarBadge = document.getElementById('unresolved-badge');
    const toolbarCount = document.getElementById('unresolved-count');
    if (unresolved > 0) {
      toolbarBadge.style.display = '';
      toolbarCount.textContent = unresolved;
    } else {
      toolbarBadge.style.display = 'none';
    }
  }

  /* ===========================
     カード操作
     =========================== */
  function deleteCard(btn) {
    const card = btn.closest('.chapter-card, .column-card');
    if (card && confirm('このカードを削除しますか?')) {
      card.remove();
      buildSidebar();
      updateCommentCounts();
      setupScrollSpy();
      showNotification('削除しました');
    }
  }

  function duplicateCard(btn) {
    const card = btn.closest('.chapter-card, .column-card');
    if (card) {
      const clone = card.cloneNode(true);
      clone.id = card.id + '_copy' + Date.now();
      card.parentNode.insertBefore(clone, card.nextSibling);
      buildSidebar();
      updateCommentCounts();
      setupScrollSpy();
      showNotification('複製しました');
    }
  }

  function populateInsertSelects() {
    const rows = Array.from(document.querySelectorAll('.toc-row'));
    document.querySelectorAll('.toc-add-form .in-after').forEach(sel => {
      const cur = sel.value;
      sel.innerHTML = '<option value="">末尾に追加</option>';
      rows.forEach(r => {
        const id = r.dataset.linkId;
        if (!id) return;
        const lbl = (r.querySelector('.toc-label')?.textContent || '').trim();
        const ttl = (r.querySelector('.toc-title')?.textContent || '').trim();
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = (lbl + ' ' + ttl).slice(0, 40) + ' の後に';
        sel.appendChild(opt);
      });
      if (cur && sel.querySelector('option[value="' + cur + '"]')) sel.value = cur;
    });
  }

  function findPriorCardOfKind(startRow, kind) {
    // startRow 以前(startRow自身を含む)の toc-row を辿り、同種の本編カードにリンクしている行を探す
    let r = startRow;
    while (r) {
      if (!r.classList || !r.classList.contains('toc-row')) break;
      const id = r.dataset.linkId;
      if (id) {
        const card = document.querySelector('.chapter-card[data-link-id="' + id + '"], .column-card[data-link-id="' + id + '"]');
        if (card) {
          if (kind === 'chapter' && card.classList.contains('chapter-card')) return card;
          if (kind === 'column' && card.classList.contains('column-card')) return card;
        }
      }
      r = r.previousElementSibling;
    }
    return null;
  }

  function addTocRow(kind) {
    const formId = kind === 'chapter' ? 'toc-add-chapter' : 'toc-add-column';
    const form = document.getElementById(formId);
    const labelEl = form.querySelector('.in-label');
    const titleEl = form.querySelector('.in-title');
    const pagesEl = form.querySelector('.in-pages');
    const afterSel = form.querySelector('.in-after');
    const label = labelEl.value.trim() || (kind === 'chapter' ? '新章' : 'コラム');
    const title = titleEl.value.trim() || 'タイトル';
    const pages = pagesEl.value.trim() || '0p';
    const afterId = afterSel ? afterSel.value : '';

    // 共有リンクID
    const linkId = 'lnk-' + Math.random().toString(36).slice(2, 10);

    // 1) TOC行を作成
    const row = document.createElement('div');
    row.className = 'toc-row' + (kind === 'column' ? ' column' : '');
    row.dataset.linkId = linkId;
    row.innerHTML =
      '<span class="toc-label" contenteditable="true">' + escapeHtml(label) + '</span>' +
      '<span class="toc-title" contenteditable="true">' + escapeHtml(title) + '</span>' +
      '<span class="toc-pages" contenteditable="true">' + escapeHtml(pages) + '</span>';

    // TOC挿入: afterId があれば直後、無ければ末尾 (フォーム直前)
    let afterRow = null;
    if (afterId) afterRow = document.querySelector('.toc-row[data-link-id="' + afterId + '"]');
    if (afterRow) {
      afterRow.after(row);
    } else {
      const addWrap = document.querySelector('.toc-add-wrap');
      addWrap.parentNode.insertBefore(row, addWrap);
    }

    // 本編カードを、TOC順序にあわせた位置に挿入
    const priorCard = afterRow ? findPriorCardOfKind(afterRow, kind) : null;
    const card = (kind === 'chapter')
      ? addChapterCard(label, title, pages, priorCard)
      : addColumnCard(label, title, pages, priorCard);
    if (card) card.dataset.linkId = linkId;

    // 編集リスナー
    attachTocRowSync(row);
    addInsertButtonsToTocRows();
    addDeleteButtonsToTocRows();
    makeTocRowsDraggable();

    // フォームをリセット
    labelEl.value = '';
    titleEl.value = '';
    if (afterSel) afterSel.value = '';

    buildSidebar();
    updateCommentCounts();
    setupScrollSpy();
    populateInsertSelects();
    showNotification(kind === 'chapter' ? '章を追加しました (目次＋本編)' : 'コラムを追加しました (目次＋本編)');
  }

  function addChapterCard(label, title, pages, afterCard) {
    const newCard = document.createElement('div');
    newCard.className = 'chapter-card';
    newCard.id = 'card-new' + Date.now();
    newCard.setAttribute('data-nav', label + ' ' + title);
    newCard.innerHTML =
      '<div class="card-actions"><button class="duplicate" onclick="duplicateCard(this)" title="複製">⎘</button><button onclick="deleteCard(this)" title="削除">×</button></div>' +
      '<div class="chapter-header">' +
      '<span class="chapter-num" contenteditable="true">' + escapeHtml(label) + '</span>' +
      '<span class="chapter-pages" contenteditable="true">' + escapeHtml(pages) + '</span>' +
      '</div>' +
      '<div class="chapter-title" contenteditable="true">' + escapeHtml(title) + '</div>' +
      '<div class="chapter-subtitle" contenteditable="true">サブタイトル</div>' +
      '<div class="chapter-content" contenteditable="true">内容</div>' +
      '<div class="comments-section"><button class="comment-toggle" onclick="toggleComments(this)"><span class="cmt-icon">💬</span> コメント</button><div class="comments-list"></div></div>';
    if (afterCard && afterCard.classList.contains('chapter-card')) {
      afterCard.after(newCard);
    } else {
      const container = document.querySelector('.container');
      const sections = container.querySelectorAll('.section-title');
      const columnSection = sections[sections.length - 1];
      columnSection.parentNode.insertBefore(newCard, columnSection);
    }
    applyEditMode();
    return newCard;
  }

  function addColumnCard(label, title, pages, afterCard) {
    const newCard = document.createElement('div');
    newCard.className = 'column-card';
    newCard.id = 'card-newcol' + Date.now();
    newCard.setAttribute('data-nav', label + ' ' + title);
    const numMatch = label.match(/\d+/);
    const num = numMatch ? numMatch[0] : 'N';
    const labelText = label.replace(/\d+/, '').trim() || 'コラム';
    newCard.innerHTML =
      '<div class="card-actions"><button class="duplicate" onclick="duplicateCard(this)" title="複製">⎘</button><button onclick="deleteCard(this)" title="削除">×</button></div>' +
      '<div class="column-header">' +
      '<span class="column-label"><span class="column-num" contenteditable="true">' + escapeHtml(num) + '</span><span contenteditable="true">' + escapeHtml(labelText) + '</span></span>' +
      '<span class="column-pages" contenteditable="true">' + escapeHtml(pages) + ' / 配置</span>' +
      '</div>' +
      '<div class="column-title" contenteditable="true">' + escapeHtml(title) + '</div>' +
      '<div class="column-subtitle" contenteditable="true">サブタイトル</div>' +
      '<div class="column-content" contenteditable="true">内容</div>' +
      '<div class="comments-section"><button class="comment-toggle" onclick="toggleComments(this)"><span class="cmt-icon">💬</span> コメント</button><div class="comments-list"></div></div>';
    if (afterCard && afterCard.classList.contains('column-card')) {
      afterCard.after(newCard);
    } else {
      const container = document.querySelector('.container');
      const todoCard = document.getElementById('card-todo');
      container.insertBefore(newCard, todoCard);
    }
    applyEditMode();
    return newCard;
  }

  /* ===========================
     全体目次 ↔ 本編カードのひも付け・同期
     =========================== */
  function findCardByLabel(label) {
    const lbl = (label || '').trim();
    if (!lbl) return null;
    for (const c of document.querySelectorAll('.chapter-card')) {
      const num = c.querySelector('.chapter-num');
      if (num && num.textContent.trim() === lbl) return c;
    }
    for (const c of document.querySelectorAll('.column-card')) {
      const num = c.querySelector('.column-num');
      const spans = c.querySelectorAll('.column-label > span');
      const sub = spans[1];
      if (num && sub) {
        const combined = sub.textContent.trim() + num.textContent.trim();
        if (combined === lbl) return c;
      }
    }
    return null;
  }

  function linkTocToCards() {
    document.querySelectorAll('.toc-row').forEach(row => {
      if (row.dataset.linkId) return;
      const labelEl = row.querySelector('.toc-label');
      if (!labelEl) return;
      const card = findCardByLabel(labelEl.textContent.trim());
      if (card && !card.dataset.linkId) {
        const id = 'lnk-' + Math.random().toString(36).slice(2, 10);
        row.dataset.linkId = id;
        card.dataset.linkId = id;
      }
    });
  }

  let _syncTimer;
  function attachTocRowSync(row) {
    row.querySelectorAll('.toc-label, .toc-title, .toc-pages').forEach(el => {
      if (el.dataset.syncBound === '1') return;
      el.dataset.syncBound = '1';
      el.addEventListener('input', () => {
        clearTimeout(_syncTimer);
        _syncTimer = setTimeout(() => syncTocRowToCard(row), 250);
      });
    });
  }
  function attachAllTocSync() {
    document.querySelectorAll('.toc-row').forEach(attachTocRowSync);
  }

  function syncTocRowToCard(row) {
    let card = null;
    const id = row.dataset.linkId;
    if (id) {
      card = document.querySelector('.chapter-card[data-link-id="' + id + '"], .column-card[data-link-id="' + id + '"]');
    }
    if (!card) {
      // 未リンクの行なら、現ラベルで再マッチ試行
      const labelEl = row.querySelector('.toc-label');
      if (labelEl) card = findCardByLabel(labelEl.textContent.trim());
      if (card) {
        const newId = 'lnk-' + Math.random().toString(36).slice(2, 10);
        row.dataset.linkId = newId;
        card.dataset.linkId = newId;
      }
    }
    if (!card) return;

    const label = row.querySelector('.toc-label').textContent;
    const title = row.querySelector('.toc-title').textContent;
    const pages = row.querySelector('.toc-pages').textContent;

    if (card.classList.contains('chapter-card')) {
      const numEl = card.querySelector('.chapter-num');
      const pgsEl = card.querySelector('.chapter-pages');
      const titEl = card.querySelector('.chapter-title');
      if (numEl) numEl.textContent = label;
      if (pgsEl) pgsEl.textContent = pages;
      if (titEl) titEl.textContent = title;
    } else if (card.classList.contains('column-card')) {
      const m = label.match(/^(.*?)(\d+)\s*$/);
      const numTxt = m ? m[2] : 'N';
      const labTxt = m ? m[1].trim() : label.trim();
      const numEl = card.querySelector('.column-num');
      const spans = card.querySelectorAll('.column-label > span');
      const labEl = spans[1];
      if (numEl) numEl.textContent = numTxt;
      if (labEl) labEl.textContent = labTxt;
      const pgsEl = card.querySelector('.column-pages');
      if (pgsEl) {
        const cur = pgsEl.textContent;
        const idx = cur.indexOf('/');
        pgsEl.textContent = idx >= 0 ? (pages.trim() + ' ' + cur.slice(idx)) : pages;
      }
      const titEl = card.querySelector('.column-title');
      if (titEl) titEl.textContent = title;
    }
    card.setAttribute('data-nav', label.trim() + ' ' + title.trim());
    buildSidebar();
    populateInsertSelects();
  }

  function addDeleteButtonsToTocRows() {
    document.querySelectorAll('.toc-row').forEach(row => {
      if (row.querySelector('.toc-del')) return;
      const btn = document.createElement('button');
      btn.className = 'toc-del';
      btn.type = 'button';
      btn.title = 'この行と本編カードを削除';
      btn.textContent = '×';
      btn.onclick = function(e) { e.stopPropagation(); deleteTocRow(row); };
      row.appendChild(btn);
    });
  }

  function addInsertButtonsToTocRows() {
    document.querySelectorAll('.toc-row').forEach(row => {
      if (row.querySelector('.toc-plus')) return;
      const kindLabel = row.classList.contains('column') ? 'コラム' : '章';
      const btn = document.createElement('button');
      btn.className = 'toc-plus';
      btn.type = 'button';
      btn.title = 'この行の下に' + kindLabel + 'を追加';
      btn.textContent = '+';
      btn.onclick = function(e) { e.stopPropagation(); insertTocRowAfter(row); };
      const delBtn = row.querySelector('.toc-del');
      if (delBtn) row.insertBefore(btn, delBtn);
      else row.appendChild(btn);
    });
  }

  function insertTocRowAfter(prevRow) {
    const kind = prevRow.classList.contains('column') ? 'column' : 'chapter';
    const linkId = 'lnk-' + Math.random().toString(36).slice(2, 10);

    // 数字パターンのプレースホルダ(renumberで正しい番号に置き換わる)
    const placeholderLabel = kind === 'chapter' ? '第0章' : 'コラム0';
    const title = 'タイトル';
    const pages = '0p';

    const row = document.createElement('div');
    row.className = 'toc-row' + (kind === 'column' ? ' column' : '');
    row.dataset.linkId = linkId;
    row.innerHTML =
      '<span class="toc-label" contenteditable="true">' + escapeHtml(placeholderLabel) + '</span>' +
      '<span class="toc-title" contenteditable="true">' + escapeHtml(title) + '</span>' +
      '<span class="toc-pages" contenteditable="true">' + escapeHtml(pages) + '</span>';
    prevRow.after(row);

    // 本編カードも同位置 (対応するカードの直後) に追加
    const priorCard = findPriorCardOfKind(prevRow, kind);
    const card = (kind === 'chapter')
      ? addChapterCard(placeholderLabel, title, pages, priorCard)
      : addColumnCard(placeholderLabel, title, pages, priorCard);
    if (card) card.dataset.linkId = linkId;

    // 編集リスナー + 各種ボタン
    attachTocRowSync(row);
    addInsertButtonsToTocRows();
    addDeleteButtonsToTocRows();
    makeTocRowsDraggable();

    // 番号を再採番
    renumberAfterReorder();

    buildSidebar();
    updateCommentCounts();
    setupScrollSpy();
    populateInsertSelects();

    // タイトル欄にフォーカス + 全選択
    const titleEl = row.querySelector('.toc-title');
    if (titleEl) {
      titleEl.focus();
      const range = document.createRange();
      range.selectNodeContents(titleEl);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    showNotification((kind === 'chapter' ? '章' : 'コラム') + 'を追加しました — タイトルを入力してください');
  }

  /* ===========================
     全体目次の並び替え (ドラッグ&ドロップ)
     =========================== */
  let _dragRow = null;
  function makeTocRowsDraggable() {
    document.querySelectorAll('.toc-row').forEach(row => {
      if (row.dataset.dragBound === '1') return;
      row.dataset.dragBound = '1';
      if (!document.body.classList.contains('editor-mode')) row.draggable = true;
      row.addEventListener('dragstart', onTocDragStart);
      row.addEventListener('dragover', onTocDragOver);
      row.addEventListener('dragleave', onTocDragLeave);
      row.addEventListener('drop', onTocDrop);
      row.addEventListener('dragend', onTocDragEnd);
    });
  }
  function onTocDragStart(e) {
    _dragRow = this;
    this.classList.add('dragging');
    try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', this.dataset.linkId || 'x'); } catch (_) {}
  }
  function onTocDragOver(e) {
    if (!_dragRow || _dragRow === this) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = this.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    this.classList.remove('drop-above', 'drop-below');
    this.classList.add(e.clientY < midY ? 'drop-above' : 'drop-below');
  }
  function onTocDragLeave() {
    this.classList.remove('drop-above', 'drop-below');
  }
  function onTocDrop(e) {
    e.preventDefault();
    e.stopPropagation();
    this.classList.remove('drop-above', 'drop-below');
    if (!_dragRow || _dragRow === this) return;
    const rect = this.getBoundingClientRect();
    const after = e.clientY >= rect.top + rect.height / 2;
    if (after) this.after(_dragRow); else this.before(_dragRow);
    renumberAfterReorder();
    reorderBodyCardsToMatchToc();
    buildSidebar();
    setupScrollSpy();
    populateInsertSelects();
    showNotification('並び替え＆番号更新しました');
  }

  function renumberAfterReorder() {
    let chapN = 0, colN = 0;
    document.querySelectorAll('.toc-row').forEach(row => {
      const labelEl = row.querySelector('.toc-label');
      if (!labelEl) return;
      const label = labelEl.textContent.trim();
      if (/^第\d+章$/.test(label)) {
        chapN += 1;
        const newLabel = '第' + chapN + '章';
        if (label !== newLabel) {
          labelEl.textContent = newLabel;
          syncTocRowToCard(row);
        }
      } else if (/^コラム\d+$/.test(label)) {
        colN += 1;
        const newLabel = 'コラム' + colN;
        if (label !== newLabel) {
          labelEl.textContent = newLabel;
          syncTocRowToCard(row);
        }
      }
      // 序章 / 終章 / その他の任意ラベルはカウントしない・変更しない
    });
  }
  function onTocDragEnd() {
    if (_dragRow) _dragRow.classList.remove('dragging');
    document.querySelectorAll('.toc-row').forEach(r => r.classList.remove('drop-above', 'drop-below'));
    _dragRow = null;
  }

  function reorderBodyCardsToMatchToc() {
    const tocRows = Array.from(document.querySelectorAll('.toc-row'));
    const chapterCards = [];
    const columnCards = [];
    tocRows.forEach(r => {
      const id = r.dataset.linkId;
      if (!id) return;
      const card = document.querySelector('.chapter-card[data-link-id="' + id + '"], .column-card[data-link-id="' + id + '"]');
      if (!card) return;
      if (card.classList.contains('chapter-card')) chapterCards.push(card);
      else if (card.classList.contains('column-card')) columnCards.push(card);
    });
    const sections = document.querySelectorAll('.container .section-title');
    const columnSection = sections[sections.length - 1];
    const todoCard = document.getElementById('card-todo');
    if (columnSection) chapterCards.forEach(card => columnSection.parentNode.insertBefore(card, columnSection));
    if (todoCard) columnCards.forEach(card => todoCard.parentNode.insertBefore(card, todoCard));
  }

  function deleteTocRow(row) {
    const label = (row.querySelector('.toc-label')?.textContent || '').trim();
    const title = (row.querySelector('.toc-title')?.textContent || '').trim();
    const display = (label + ' ' + title).trim() || 'この行';
    if (!confirm('「' + display + '」を削除しますか？\n（本編の該当カードも同時に削除されます）')) return;

    let card = null;
    const id = row.dataset.linkId;
    if (id) {
      card = document.querySelector('.chapter-card[data-link-id="' + id + '"], .column-card[data-link-id="' + id + '"]');
    }
    if (!card) card = findCardByLabel(label);

    row.remove();
    if (card) card.remove();

    renumberAfterReorder();
    buildSidebar();
    updateCommentCounts();
    setupScrollSpy();
    populateInsertSelects();
    showNotification('削除＆番号更新しました');
  }

  // 旧APIは互換のため残す (ツールバーボタン削除済)
  function addChapter() { addChapterCard('新章', 'タイトル', '0p'); buildSidebar(); updateCommentCounts(); setupScrollSpy(); }
  function addColumn() { addColumnCard('コラムN', 'タイトル', '0p'); buildSidebar(); updateCommentCounts(); setupScrollSpy(); }

  /* ===========================
     保存
     =========================== */
  const GH_REPO_OWNER = 'MichinoriShimoji';
  const GH_REPO_NAME = 'wsp-k9x3r2m8';
  const GH_FILE_PATH = 'plan.html';
  const GH_BRANCH = 'main';

  /* ===========================
     汎用の暗号化/復号
     =========================== */
  async function encryptWithPassword(text, password) {
    const enc = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      km,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt']
    );
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
    const blob = new Uint8Array(salt.length + iv.length + ct.byteLength);
    blob.set(salt, 0); blob.set(iv, salt.length); blob.set(new Uint8Array(ct), salt.length + iv.length);
    let bstr = '';
    for (let i = 0; i < blob.length; i++) bstr += String.fromCharCode(blob[i]);
    return btoa(bstr);
  }
  async function decryptWithPassword(b64, password) {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const salt = raw.slice(0, 16);
    const iv = raw.slice(16, 28);
    const ct = raw.slice(28);
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      km,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return new TextDecoder().decode(pt);
  }

  async function loadGitHubToken() {
    const el = document.getElementById('encryptedToken');
    const password = sessionStorage.getItem('pw_raw');
    if (!el || !el.textContent.trim() || !password) return;
    try {
      window._ghPat = await decryptWithPassword(el.textContent.trim(), password);
    } catch (e) {
      console.warn('PAT decrypt failed:', e);
      window._ghPat = null;
    }
  }

  async function buildEncryptedHTML() {
    const password = sessionStorage.getItem('pw_raw');
    if (!password) throw new Error('セッション情報が失効しています。一度リロードしてログインし直してください。');

    // 開いているコメントフォーム等を閉じる
    document.querySelectorAll('.comment-add').forEach(e => e.remove());
    document.querySelectorAll('.comments-list.open').forEach(e => e.classList.remove('open'));

    const appEl = document.getElementById('app');
    const sidebarContent = appEl.querySelector('#sidebar-content');
    const sidebarBackup = sidebarContent ? sidebarContent.innerHTML : null;
    if (sidebarContent) sidebarContent.innerHTML = '';
    const appInner = appEl.innerHTML;
    if (sidebarContent && sidebarBackup !== null) sidebarContent.innerHTML = sidebarBackup;

    const plaintext = '<div class="layout" id="app" style="display:none;">\n' + appInner + '</div>';

    const enc = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      km,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt']
    );
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
    const blob = new Uint8Array(salt.length + iv.length + ct.byteLength);
    blob.set(salt, 0);
    blob.set(iv, salt.length);
    blob.set(new Uint8Array(ct), salt.length + iv.length);
    let bstr = '';
    for (let i = 0; i < blob.length; i++) bstr += String.fromCharCode(blob[i]);
    const b64 = btoa(bstr);

    const clone = document.documentElement.cloneNode(true);
    const cloneApp = clone.querySelector('#app');
    if (cloneApp) { cloneApp.innerHTML = ''; cloneApp.style.display = 'none'; }
    const cloneTb = clone.querySelector('#toolbar');
    if (cloneTb) cloneTb.style.display = 'none';
    const cloneScreen = clone.querySelector('#password-screen');
    if (cloneScreen) cloneScreen.classList.remove('hidden');
    const cloneInput = clone.querySelector('#pw-input');
    if (cloneInput) cloneInput.value = '';
    const cloneErr = clone.querySelector('#pw-error');
    if (cloneErr) cloneErr.classList.remove('show');
    const cloneEnc = clone.querySelector('#encryptedData');
    if (cloneEnc) cloneEnc.textContent = b64;

    return '<!DOCTYPE html>\n' + clone.outerHTML;
  }

  async function saveAsHTML() {
    try {
      const html = await buildEncryptedHTML();
      const out = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(out);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showNotification('index.html として保存しました (暗号化済)');
    } catch (e) {
      alert('保存失敗: ' + e.message);
    }
  }

  async function configureGitHubToken() {
    const password = sessionStorage.getItem('pw_raw');
    if (!password) { alert('セッション切れ。再ログインしてください。'); return; }

    const el = document.getElementById('encryptedToken');
    const hasToken = !!(window._ghPat || (el && el.textContent.trim()));
    const msg = hasToken
      ? 'GitHub PAT は設定済み (先頭: ' + (window._ghPat ? window._ghPat.slice(0, 12) : '?') + '...)\n\n新しいトークンを入力 (空欄で削除・キャンセルで変更なし):\n\n※ 変更は「☁ GitHub保存」を押すとリポジトリに反映されます'
      : 'GitHub Personal Access Token を入力:\n\n取得方法: github.com/settings/personal-access-tokens/new\n- Repository access: ' + GH_REPO_NAME + '\n- Permissions → Contents: Read and write\n\n※ pw "' + password.slice(0,3) + '..." で暗号化してHTMLに埋め込みます。';
    const token = prompt(msg, '');
    if (token === null) return;

    if (token.trim() === '') {
      if (el) el.textContent = '';
      window._ghPat = null;
      // 念のため旧localStorage もクリア
      localStorage.removeItem('gh_pat');
      showNotification('トークンを削除しました (☁GitHub保存で反映)');
      return;
    }

    try {
      const encB64 = await encryptWithPassword(token.trim(), password);
      if (el) el.textContent = encB64;
      window._ghPat = token.trim();
      localStorage.removeItem('gh_pat'); // 旧キーは不要
      showNotification('トークンを暗号化保存しました (☁GitHub保存で反映)');
    } catch (e) {
      alert('暗号化失敗: ' + e.message);
    }
  }

  async function saveToGitHub() {
    // 1) in-memory、2) encryptedToken 要素 の順に PAT を取得
    let token = window._ghPat;
    if (!token) {
      await loadGitHubToken();
      token = window._ghPat;
    }
    if (!token) {
      await configureGitHubToken();
      token = window._ghPat;
      if (!token) return;
    }

    showNotification('GitHub に保存中...');

    let html;
    try {
      html = await buildEncryptedHTML();
    } catch (e) {
      alert('暗号化失敗: ' + e.message);
      return;
    }

    // UTF-8 → base64
    const bytes = new TextEncoder().encode(html);
    let bstr = '';
    const CHUNK = 0x8000;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      bstr += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    const contentB64 = btoa(bstr);

    const apiBase = 'https://api.github.com/repos/' + GH_REPO_OWNER + '/' + GH_REPO_NAME + '/contents/' + GH_FILE_PATH;
    const headers = {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };

    let sha;
    try {
      const resp = await fetch(apiBase + '?ref=' + GH_BRANCH, { headers });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error('GET ' + resp.status + ': ' + err.slice(0, 300));
      }
      const data = await resp.json();
      sha = data.sha;
    } catch (e) {
      alert('GitHub 取得エラー: ' + e.message + '\n\nトークン/権限を確認してください。');
      return;
    }

    const stamp = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
    const body = {
      message: 'Update content (' + stamp + ')',
      content: contentB64,
      sha: sha,
      branch: GH_BRANCH
    };

    try {
      const resp = await fetch(apiBase, {
        method: 'PUT',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error('PUT ' + resp.status + ': ' + err.slice(0, 300));
      }
      showNotification('✓ GitHub に保存しました (Pages は30秒前後で反映)');
    } catch (e) {
      alert('GitHub 保存エラー: ' + e.message);
    }
  }

  /* ===========================
     ユーティリティ
     =========================== */
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) {
    return String(s).replace(/"/g, '&quot;');
  }
  function formatDate(d) {
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  function showNotification(msg) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 2500);
  }

  // Tabキー対策
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Tab' && e.target.isContentEditable) {
      e.preventDefault();
    }
  });
</script>
