<title>作業ページ</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Noto Sans JP",sans-serif;background:#faf9f7;color:#1a1a2e;line-height:1.7;font-size:16px}
  #pw-screen{position:fixed;inset:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
  #pw-screen.hidden{display:none}
  .pw-box{background:#fff;border-radius:12px;padding:40px;max-width:420px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
  .pw-encrypt-badge{display:inline-block;background:#1a1a2e;color:#d89a3a;padding:3px 10px;border-radius:12px;font-size:10px;letter-spacing:0.1em;margin-bottom:16px;font-weight:700}
  .pw-box h1{font-family:"Noto Serif JP",serif;font-size:20px;margin-bottom:8px}
  .pw-box p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.8}
  .pw-box input{width:100%;padding:12px 16px;font-size:15px;border:2px solid #ddd;border-radius:6px;font-family:inherit;outline:none;transition:border-color 0.2s}
  .pw-box input:focus{border-color:#c0392b}
  .pw-box button{width:100%;margin-top:12px;padding:12px;background:#c0392b;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
  .pw-box button:hover{background:#a62f24}
  .pw-error{color:#c0392b;font-size:12px;margin-top:10px;display:none}
  .pw-error.show{display:block}
</style>
</head>

  <div class="pw-box">
    <div class="pw-encrypt-badge">🔒 暗号化ページ</div>
    <h1>作業ページ</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw-input" autofocus>
    <div class="pw-error" id="pw-error">パスワードが違います</div>
    <button type="button" onclick="tryAuth()">ロック解除</button>
  </div>
</div>

<script>
  async function deriveKey(password, salt) {
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"}, km, {name:"AES-GCM",length:256}, false, ["decrypt"]);
  }
  async function decryptBlob(password) {
    const b64 = document.getElementById("encryptedData").textContent.trim();
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const salt = raw.slice(0,16), iv = raw.slice(16,28), ct = raw.slice(28);
    const key = await deriveKey(password, salt);
    const pt = await crypto.subtle.decrypt({name:"AES-GCM",iv}, key, ct);
    return new TextDecoder().decode(pt);
  }
  async function unlock(password) {
    const html = await decryptBlob(password);
    document.getElementById("main").innerHTML = html;
    document.getElementById("main").style.display = "block";
    document.getElementById("pw-screen").classList.add("hidden");
    sessionStorage.setItem("pw_raw", password);
  }
  async function tryAuth() {
    const pw = document.getElementById("pw-input").value;
    try { await unlock(pw); }
    catch (e) {
      document.getElementById("pw-error").classList.add("show");
      document.getElementById("pw-input").value = "";
    }
  }
  document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") tryAuth(); });
  (async () => {
    const saved = sessionStorage.getItem("pw_raw");
    if (saved) {
      try { await unlock(saved); }
      catch (e) { sessionStorage.removeItem("pw_raw"); }
    }
  })();
</script>
